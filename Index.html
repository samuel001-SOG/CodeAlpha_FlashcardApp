<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcard Quiz App — CodeAlpha</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: #07080f; color: #e0e0f0; font-family: 'Cormorant Garamond', Georgia, serif; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2c42; border-radius: 9px; }

    /* ── NAVBAR ── */
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 28px; border-bottom: 1px solid #161728;
      position: sticky; top: 0; background: #07080f; z-index: 100;
    }
    .nav-brand { cursor: pointer; }
    .nav-brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 4px; color: #6366f1; text-transform: uppercase; }
    .nav-brand-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 20px; color: #fff; letter-spacing: -0.5px; margin-top: 2px; }
    .nav-btns { display: flex; gap: 8px; }
    .nav-btn { padding: 7px 16px; border-radius: 100px; font-size: 11px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; border: 1px solid #1a1c2e; background: transparent; color: #444; }
    .nav-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }
    .nav-btn:hover:not(.active) { color: #888; border-color: #333; }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── TOAST ── */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-12px);
      background: #131425; border: 1px solid #2a2c42; border-radius: 100px;
      padding: 10px 24px; font-size: 13px; font-family: monospace; color: #a0a0c0;
      z-index: 999; opacity: 0; pointer-events: none; white-space: nowrap;
      transition: opacity 0.3s ease, transform 0.3s ease; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── HOME ── */
    #screen-home { padding: 48px 28px; max-width: 960px; margin: 0 auto; }
    .home-hero { margin-bottom: 40px; }
    .home-title { font-family: 'Cormorant Garamond', serif; font-weight: 700;
      font-size: clamp(36px,6vw,64px); letter-spacing: -2px; color: #fff; line-height: 1.1; margin-bottom: 12px; }
    .home-title em { font-style: italic; color: #6366f1; }
    .home-meta { color: #444; font-size: 14px; font-family: monospace; }
    .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .deck-card { background: #0d0e1b; border-radius: 20px; padding: 24px 22px;
      cursor: pointer; transition: all 0.22s ease; border: 1px solid transparent; }
    .deck-card:hover { transform: translateY(-4px); box-shadow: 0 20px 48px rgba(0,0,0,0.5); }
    .deck-emoji { font-size: 32px; margin-bottom: 12px; }
    .deck-name { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 20px; color: #fff; margin-bottom: 6px; }
    .deck-desc { font-size: 12px; color: #444; margin-bottom: 16px; font-style: italic; }
    .deck-footer { display: flex; justify-content: space-between; align-items: center; }
    .deck-count { padding: 4px 12px; border-radius: 100px; font-size: 11px; font-family: monospace; border: 1px solid; }
    .deck-cta { font-size: 12px; color: #6366f1; font-family: monospace; }

    /* ── STUDY ── */
    #screen-study { display: flex; flex-direction: column; align-items: center; padding: 40px 24px 60px; max-width: 760px; margin: 0 auto; }
    .study-topbar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .back-link { background: none; border: none; color: #444; cursor: pointer; font-family: monospace; font-size: 11px; }
    .score-pills { display: flex; gap: 8px; }
    .score-pill { padding: 5px 14px; border-radius: 100px; font-size: 11px; font-family: monospace; border: 1px solid; }
    .deck-label { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .deck-label-name { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 18px; }

    .progress-bar-wrap { width: 100%; margin-bottom: 28px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: #333; font-family: monospace; margin-bottom: 8px; }
    .progress-bar-bg { height: 3px; background: #161728; border-radius: 9px; }
    .progress-bar-fill { height: 100%; border-radius: 9px; transition: width 0.4s ease; }

    .flashcard { width: 100%; min-height: 260px; background: #0d0e1b;
      border-radius: 24px; padding: 48px 44px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      transition: opacity 0.23s ease, transform 0.23s ease, border-color 0.3s; }
    .flashcard.animout { opacity: 0; transform: scale(0.96); }
    .flashcard-hint { position: absolute; top: 18px; right: 22px; font-size: 10px;
      font-family: monospace; color: #2a2c42; letter-spacing: 2px; text-transform: uppercase; }
    .flashcard-dot { position: absolute; top: 18px; left: 22px; width: 10px; height: 10px;
      border-radius: 50%; display: none; }
    .flashcard.flipped .flashcard-dot { display: block; }
    .flashcard-text { font-size: clamp(17px,2.8vw,22px); line-height: 1.65;
      text-align: center; transition: color 0.3s; }

    .show-answer-btn { margin-top: 20px; padding: 10px 28px; background: transparent;
      border-radius: 100px; font-size: 12px; font-family: monospace; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .study-nav { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }
    .nav-action-btn { padding: 10px 20px; border-radius: 100px; font-size: 12px;
      font-family: monospace; cursor: pointer; border: 1px solid; transition: all 0.2s; }
    .nav-action-btn:hover { transform: translateY(-1px); opacity: 0.82; }

    /* ── MANAGE ── */
    #screen-manage { padding: 40px 28px; max-width: 760px; margin: 0 auto; }
    .manage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .manage-title { font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 32px; color: #fff; }
    .add-card-btn { padding: 10px 22px; background: #6366f1; border: none; border-radius: 100px; color: #fff; font-size: 12px; font-family: monospace; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
    .add-card-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn { padding: 5px 14px; border-radius: 100px; font-size: 11px; font-family: monospace; cursor: pointer; transition: all 0.2s; border: 1px solid #1a1c2e; background: transparent; color: #444; }
    .filter-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }
    .cards-list { display: flex; flex-direction: column; gap: 10px; }
    .card-row { background: #0d0e1b; border: 1px solid #161728; border-radius: 14px; padding: 16px 20px; display: flex; gap: 14px; align-items: flex-start; }
    .card-row-content { flex: 1; }
    .card-row-q { font-size: 12px; font-family: monospace; margin-bottom: 4px; }
    .card-row-a { font-size: 12px; color: #444; font-style: italic; }
    .card-row-deck { font-size: 10px; color: #2a2c42; margin-top: 6px; font-family: monospace; }
    .card-row-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .edit-btn { background: #131425; border: 1px solid #1a1c2e; border-radius: 8px; color: #666; padding: 5px 12px; cursor: pointer; font-size: 11px; font-family: monospace; transition: all 0.2s; }
    .del-btn { background: #1a0505; border: 1px solid rgba(239,68,68,0.35); border-radius: 8px; color: #ef4444; padding: 5px 12px; cursor: pointer; font-size: 11px; font-family: monospace; transition: all 0.2s; }
    .edit-btn:hover, .del-btn:hover { transform: translateY(-1px); }
    .empty-state { text-align: center; padding: 80px 20px; color: #333; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── FORM ── */
    #screen-form { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 48px 24px; }
    .form-card { width: 100%; max-width: 520px; background: #0d0e1b; border: 1px solid #1a1c2e; border-radius: 24px; padding: 36px 32px; }
    .form-title { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 26px; color: #fff; margin-bottom: 28px; }
    .form-label { font-size: 11px; color: #444; font-family: monospace; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 8px; }
    .deck-select-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
    .deck-sel-btn { padding: 5px 12px; border-radius: 100px; font-size: 11px; font-family: monospace; cursor: pointer; transition: all 0.2s; border: 1px solid #1a1c2e; background: transparent; color: #444; }
    textarea { width: 100%; background: #07080f; border: 1px solid #1a1c2e; border-radius: 10px; color: #e0e0f0; padding: 12px 14px; font-size: 14px; font-family: 'Cormorant Garamond', serif; resize: vertical; outline: none; line-height: 1.5; }
    textarea:focus { border-color: #6366f1; }
    .form-q { margin-bottom: 20px; }
    .form-a { margin-bottom: 28px; }
    .form-footer { display: flex; gap: 10px; justify-content: flex-end; }
    .cancel-btn { padding: 10px 20px; background: transparent; border: 1px solid #1a1c2e; border-radius: 100px; color: #444; cursor: pointer; font-size: 12px; font-family: monospace; transition: all 0.2s; }
    .save-form-btn { padding: 10px 26px; background: #6366f1; border: none; border-radius: 100px; color: #fff; cursor: pointer; font-size: 12px; font-family: monospace; letter-spacing: 1px; transition: all 0.2s; }
    .cancel-btn:hover, .save-form-btn:hover { transform: translateY(-1px); opacity: 0.85; }

    @keyframes float { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-8px); } }
  </style>
</head>
<body>

  <div class="toast" id="toast"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand" onclick="goScreen('home')">
      <div class="nav-brand-sub">CodeAlpha · Task 01</div>
      <div class="nav-brand-title">Flashcard Quiz</div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn active" id="nav-home" onclick="goScreen('home')">Home</button>
      <button class="nav-btn" id="nav-study" onclick="if(state.activeDeck)goScreen('study')">Study</button>
      <button class="nav-btn" id="nav-manage" onclick="goScreen('manage')">Manage</button>
    </div>
  </nav>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-hero">
      <h1 class="home-title">Choose a<br><em>Deck to Study</em></h1>
      <p class="home-meta" id="home-meta"></p>
    </div>
    <div class="deck-grid" id="deck-grid"></div>
  </div>

  <!-- STUDY -->
  <div id="screen-study" class="screen">
    <div class="study-topbar">
      <button class="back-link" onclick="goScreen('home')">← Decks</button>
      <div class="score-pills">
        <div class="score-pill" id="score-got" style="background:#0d2e1a;border-color:rgba(34,197,94,0.35);color:#22c55e">✓ 0</div>
        <div class="score-pill" id="score-review" style="background:#1a1205;border-color:rgba(245,158,11,0.35);color:#f59e0b">📌 0</div>
      </div>
    </div>
    <div class="deck-label" id="deck-label"></div>
    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span id="card-counter">Card 1 / 1</span>
        <span id="card-pct">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="flashcard-hint" id="card-hint">Question · tap to flip</div>
      <div class="flashcard-dot" id="card-dot"></div>
      <p class="flashcard-text" id="card-text"></p>
    </div>
    <button class="show-answer-btn" id="show-answer-btn" onclick="flipCard()">Show Answer</button>
    <div class="study-nav" id="study-nav">
      <button class="nav-action-btn" style="background:#131425;border-color:#1a1c2e;color:#555" onclick="navigate(-1)">← Prev</button>
      <button class="nav-action-btn" id="btn-learning" style="display:none;background:#1a0f05;border-color:rgba(245,158,11,0.35);color:#f59e0b" onclick="markLearning()">Still Learning</button>
      <button class="nav-action-btn" id="btn-got" style="display:none;background:#051a0a;border-color:rgba(34,197,94,0.35);color:#22c55e" onclick="markGot()">Got It ✓</button>
      <button class="nav-action-btn" style="background:#131425;border-color:#1a1c2e;color:#555" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <!-- MANAGE -->
  <div id="screen-manage" class="screen">
    <div class="manage-header">
      <h2 class="manage-title">Manage Cards</h2>
      <button class="add-card-btn" onclick="openForm(null,null)">+ Add Card</button>
    </div>
    <div class="filter-row" id="filter-row"></div>
    <div id="cards-list-wrap"></div>
  </div>

  <!-- FORM -->
  <div id="screen-form" class="screen">
    <div class="form-card">
      <h2 class="form-title" id="form-title">New Card</h2>
      <label class="form-label">Add to Deck</label>
      <div class="deck-select-row" id="deck-select-row"></div>
      <label class="form-label">Question</label>
      <textarea id="form-q" class="form-q" rows="3" placeholder="Enter your question..."></textarea>
      <label class="form-label">Answer</label>
      <textarea id="form-a" class="form-a" rows="3" placeholder="Enter the answer..."></textarea>
      <div class="form-footer">
        <button class="cancel-btn" onclick="goScreen('manage')">Cancel</button>
        <button class="save-form-btn" onclick="saveCard()">Save Card</button>
      </div>
    </div>
  </div>

};

const DECK_KEYS = Object.keys(DECKS_DATA);

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  activeDeck: null,
  cardIdx: 0,
  flipped: false,
  score: { got: 0, review: 0 },
  customCards: {},
  formDeck: DECK_KEYS[0],
  formEditDeckKey: null,
  formEditIdx: null,
  filterDeck: null,
  animOut: false
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function getDeckCards(key) {
  return [...(DECKS_DATA[key]?.cards || []), ...(state.customCards[key] || [])];
}

function getTotalCards() {
  return DECK_KEYS.reduce((a, k) => a + getDeckCards(k).length, 0);
}

function getTotalCustom() {
  return Object.values(state.customCards).reduce((a, c) => a + c.length, 0);
}

function goScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  const nb = document.getElementById("nav-" + id);
  if (nb) nb.classList.add("active");
  if (id === "home") renderHome();
  if (id === "manage") renderManage();
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function renderHome() {
  document.getElementById("home-meta").textContent =
    `${getTotalCards()} total cards across ${DECK_KEYS.length} decks · ${getTotalCustom()} custom cards added`;
  const grid = document.getElementById("deck-grid");
  grid.innerHTML = "";
  DECK_KEYS.forEach(key => {
    const d = DECKS_DATA[key];
    const count = getDeckCards(key).length;
    const card = document.createElement("div");
    card.className = "deck-card";
    card.style.border = `1px solid ${d.color}25`;
    card.style.boxShadow = `0 4px 20px rgba(0,0,0,0.3), 0 0 0 1px ${d.color}08`;
    card.innerHTML = `
      <div class="deck-emoji">${d.emoji}</div>
      <div class="deck-name">${d.label}</div>
      <div class="deck-desc">${d.description}</div>
      <div class="deck-footer">
        <div class="deck-count" style="color:${d.color};border-color:${d.color}35;background:${d.color}15">${count} cards</div>
        <div class="deck-cta">Study →</div>
      </div>`;
    card.onclick = () => startDeck(key);
    grid.appendChild(card);
  });
}

// ─── STUDY ───────────────────────────────────────────────────────────────────
function startDeck(key) {
  state.activeDeck = key;
  state.cardIdx = 0;
  state.flipped = false;
  state.score = { got: 0, review: 0 };
  renderStudy();
  goScreen("study");
}

function renderStudy() {
  const key = state.activeDeck;
  const d = DECKS_DATA[key];
  const cards = getDeckCards(key);
  const card = cards[state.cardIdx];
  if (!card) return;
  const progress = ((state.cardIdx + 1) / cards.length) * 100;

  // deck label
  document.getElementById("deck-label").innerHTML =
    `<span style="font-size:20px">${d.emoji}</span><span class="deck-label-name" style="color:${d.color}">${d.label}</span>`;

  // progress
  document.getElementById("card-counter").textContent = `Card ${state.cardIdx + 1} / ${cards.length}`;
  document.getElementById("card-pct").textContent = `${Math.round(progress)}%`;
  document.getElementById("progress-fill").style.width = `${progress}%`;
  document.getElementById("progress-fill").style.background = `linear-gradient(90deg,${d.color},${d.color}99)`;

  // card
  const fc = document.getElementById("flashcard");
  fc.style.border = `1px solid ${state.flipped ? d.color + "40" : "#1a1c2e"}`;
  fc.style.boxShadow = `0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px ${state.flipped ? d.color : "#000"}15`;
  document.getElementById("card-hint").textContent = `${state.flipped ? "Answer" : "Question"} · tap to flip`;
  document.getElementById("card-dot").style.background = d.color;
  const ct = document.getElementById("card-text");
  ct.textContent = state.flipped ? card.a : card.q;
  ct.style.color = state.flipped ? d.color : "#ddddf0";
  ct.style.fontStyle = state.flipped ? "italic" : "normal";
  if (state.flipped) fc.classList.add("flipped"); else fc.classList.remove("flipped");

  // show answer btn
  document.getElementById("show-answer-btn").style.display = state.flipped ? "none" : "inline-block";
  document.getElementById("show-answer-btn").style.color = d.color;
  document.getElementById("show-answer-btn").style.border = `1px solid ${d.color}50`;

  // mark buttons
  document.getElementById("btn-learning").style.display = state.flipped ? "inline-block" : "none";
  document.getElementById("btn-got").style.display = state.flipped ? "inline-block" : "none";

  // score
  document.getElementById("score-got").textContent = `✓ ${state.score.got}`;
  document.getElementById("score-review").textContent = `📌 ${state.score.review}`;
}

function flipCard() { state.flipped = !state.flipped; renderStudy(); }

function navigate(dir) {
  const fc = document.getElementById("flashcard");
  fc.classList.add("animout");
  setTimeout(() => {
    const cards = getDeckCards(state.activeDeck);
    state.cardIdx = (state.cardIdx + dir + cards.length) % cards.length;
    state.flipped = false;
    renderStudy();
    fc.classList.remove("animout");
  }, 230);
}

function markGot() { state.score.got++; showToast("✅ Got it!"); navigate(1); }
function markLearning() { state.score.review++; showToast("📌 Marked for review"); navigate(1); }

// ─── MANAGE ──────────────────────────────────────────────────────────────────
function renderManage() {
  // filter row
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "filter-btn" + (state.filterDeck === null ? " active" : "");
  allBtn.textContent = "All Custom";
  allBtn.onclick = () => { state.filterDeck = null; renderManage(); };
  fr.appendChild(allBtn);
  DECK_KEYS.forEach(k => {
    const count = (state.customCards[k] || []).length;
    if (count === 0) return;
    const d = DECKS_DATA[k];
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (state.filterDeck === k ? " active" : "");
    btn.style.color = state.filterDeck === k ? "#000" : d.color;
    btn.style.borderColor = state.filterDeck === k ? d.color : "#1a1c2e";
    btn.style.background = state.filterDeck === k ? d.color : "transparent";
    btn.textContent = `${d.emoji} ${d.label} (${count})`;
    btn.onclick = () => { state.filterDeck = k; renderManage(); };
    fr.appendChild(btn);
  });

  // cards list
  const wrap = document.getElementById("cards-list-wrap");
  const keysToShow = state.filterDeck ? [state.filterDeck] : DECK_KEYS;
  let html = '<div class="cards-list">';
  let count = 0;
  keysToShow.forEach(key => {
    (state.customCards[key] || []).forEach((card, i) => {
      count++;
      const d = DECKS_DATA[key];
      html += `<div class="card-row">
        <div class="card-row-content">
          <div class="card-row-q" style="color:${d.color}">Q: ${card.q}</div>
          <div class="card-row-a">A: ${card.a}</div>
          <div class="card-row-deck">${d.emoji} ${d.label}</div>
        </div>
        <div class="card-row-btns">
          <button class="edit-btn" onclick="openForm('${key}',${i})">Edit</button>
          <button class="del-btn" onclick="deleteCard('${key}',${i})">Del</button>
        </div>
      </div>`;
    });
  });
  html += "</div>";
  if (count === 0) {
    html = `<div class="empty-state"><div class="empty-icon">📭</div><p style="font-style:italic;font-size:14px">No custom cards yet. Add your own!</p></div>`;
  }
  wrap.innerHTML = html;
}

function deleteCard(key, idx) {
  state.customCards[key].splice(idx, 1);
  showToast("🗑️ Deleted");
  renderManage();
}

// ─── FORM ─────────────────────────────────────────────────────────────────────
function openForm(deckKey, idx) {
  state.formEditDeckKey = deckKey;
  state.formEditIdx = idx;
  state.formDeck = deckKey || DECK_KEYS[0];
  document.getElementById("form-title").textContent = idx !== null ? "Edit Card" : "New Card";
  document.getElementById("form-q").value = idx !== null ? state.customCards[deckKey][idx].q : "";
  document.getElementById("form-a").value = idx !== null ? state.customCards[deckKey][idx].a : "";
  renderDeckSelectRow();
  goScreen("form");
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
}

function renderDeckSelectRow() {
  const row = document.getElementById("deck-select-row");
  row.innerHTML = "";
  DECK_KEYS.forEach(k => {
    const d = DECKS_DATA[k];
    const isSel = state.formDeck === k;
    const btn = document.createElement("button");
    btn.className = "deck-sel-btn";
    btn.style.color = isSel ? d.color : "#444";
    btn.style.borderColor = isSel ? d.color : "#1a1c2e";
    btn.style.background = isSel ? `${d.color}25` : "transparent";
    btn.textContent = `${d.emoji} ${d.label}`;
    btn.onclick = () => { state.formDeck = k; renderDeckSelectRow(); };
    row.appendChild(btn);
  });
}

function saveCard() {
  const q = document.getElementById("form-q").value.trim();
  const a = document.getElementById("form-a").value.trim();
  if (!q || !a) { showToast("⚠️ Please fill in both fields"); return; }
  const key = state.formDeck;
  if (!state.customCards[key]) state.customCards[key] = [];
  if (state.formEditIdx !== null && state.formEditDeckKey === key) {
    state.customCards[key][state.formEditIdx] = { q, a };
    showToast("✏️ Card updated!");
  } else {
    state.customCards[key].push({ q, a });
    showToast("➕ Card added!");
  }
  goScreen("manage");
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
